version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: spotify_app
    volumes:
      - .:/var/www
    networks:
      - spotify_network

  webserver:
    image: nginx:alpine
    container_name: spotify_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - spotify_network

  db:
    image: mysql:8.0
    container_name: spotify_db
    restart: always
    environment:
      MYSQL_DATABASE: spotify
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: spotify_user
      MYSQL_PASSWORD: spotify_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - spotify_network

networks:
  spotify_network:
    driver: bridge

volumes:
  db_data: